<!DOCTYPE html>
<html>

<head>

<title>Contact</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<section>

<p>
Phone:
<a href="#" onclick="phoneClick()">Call Now</a>
</p>

<p>
WhatsApp:
<a href="#" onclick="whatsappClick()">Chat Now</a>
</p>

<h3>Send Message</h3>

<form onsubmit="contactSubmit(); return false;">

<input placeholder="Name" required>
<br><br>

<input placeholder="Email" required>
<br><br>

<textarea placeholder="Message"></textarea>

<br><br>

<button type="submit">Submit</button>

</form>

</section>

<script src="script.js"></script>

<script>

function contactSubmit(){

window.dataLayer = window.dataLayer || [];

dataLayer.push({
event:"contact_form_submit"
});

alert("Message sent");

}

</script>

</body>
</html>
